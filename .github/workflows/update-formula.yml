name: update-formula

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install formula generator dependencies
        run: python -m pip install --upgrade packaging requests

      - name: Generate Formula/video-capture-mcp.rb
        env:
          RELEASE_TAG: ${{ inputs.version }}
        run: python scripts/generate_formula.py "$RELEASE_TAG"

      - name: Commit formula update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/video-capture-mcp.rb
          git commit -m "chore: update video-capture-mcp formula to ${RELEASE_TAG}" || exit 0
          git push

