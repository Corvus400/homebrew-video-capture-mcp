name: update-formula

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install formula generator dependencies
        run: python -m pip install --upgrade packaging requests

      - name: Generate Formula/video-capture-mcp.rb
        env:
          RELEASE_TAG: ${{ inputs.version }}
        run: python scripts/generate_formula.py "$RELEASE_TAG"

      - name: Commit, check, and merge formula update
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.version }}
        run: |
          version="${RELEASE_TAG#v}"
          branch="update-video-capture-mcp-${version}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "${branch}"
          git add Formula/video-capture-mcp.rb
          if git diff --cached --quiet
          then
            exit 0
          fi
          git commit -m "chore: update video-capture-mcp formula to ${RELEASE_TAG}"
          git push --force-with-lease origin "${branch}"
          if gh pr view "${branch}" --json number
          then
            gh pr edit "${branch}" --title "chore: update video-capture-mcp formula to ${RELEASE_TAG}"
            pr_number="$(gh pr view "${branch}" --json number --jq .number)"
          else
            gh pr create \
              --base main \
              --head "${branch}" \
              --title "chore: update video-capture-mcp formula to ${RELEASE_TAG}" \
              --body "Update video-capture-mcp Homebrew formula to ${RELEASE_TAG}. The workflow opens this PR, waits for tap-ci, and merges only after branch protection passes."
            pr_number="$(gh pr view "${branch}" --json number --jq .number)"
          fi

          for _ in {1..60}; do
            state="$(gh pr checks "${pr_number}" --json name,state --jq '.[] | select(.name == "tap-ci") | .state' || true)"
            if [ "${state}" = "SUCCESS" ]; then
              gh pr merge "${pr_number}" --squash --delete-branch
              exit 0
            fi
            if [ "${state}" = "FAILURE" ] || [ "${state}" = "ERROR" ] || [ "${state}" = "CANCELLED" ]; then
              gh pr checks "${pr_number}"
              exit 1
            fi
            sleep 10
          done
          echo "tap-ci did not pass for PR #${pr_number}" >&2
          exit 1
